services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - /app/node_modules # 👈 garde seulement node_modules, retire .:/app
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=${HOST_IP}
    stdin_open: true
    tty: true
